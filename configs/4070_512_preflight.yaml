training_mode: from_scratch
transformer:
  vocab_size: 32000
  max_seq_len: 512
  n_layers: 18
  d_model: 768
  n_q_heads: 12
  n_kv_heads: 4
  ffn_dim: 2560
  dual_stream_layers: [5, 11]
  dense_feedback_layer: 14
  dropout: 0.0
  gradient_checkpointing: true
diffusion:
  latent_dim: 256
  denoise_dim: 512
  denoiser_layers: 4
  denoiser_heads: 8
  ddpm_timesteps: 1000
  ddim_steps: 10
  prediction_type: v_prediction
  train_t_start_choices: [300, 500, 650, 800]
  infer_t_start: [300, 500, 650, 800]
  idea_slots: 16
loop:
  latent_dim: 256
  block_layers: 4
  heads: 8
  train_steps_choices: [2, 4, 8]
  infer_steps: 8
  max_steps: 12
interaction:
  train_rounds: 3
  infer_min_rounds: 2
  infer_max_rounds: 5
memory:
  n_slots: 215000
  d_mem: 256
  query_dim: 128
  top_k: 64
  graph_nodes: 64
  use_lsh: true
  lsh_max_candidates: 2048
  lsh_query_chunk: 16
  exact_threshold: 65536
  online_update: false
dense_feedback:
  enabled: true
  n_routes: 10
  warmup_steps: 2000
  recompute_current_forward: true
  cached_next_forward: false
optim:
  lr: 1.0e-3
  min_lr: 1.0e-4
  warmup_steps: 2000
  total_steps: 100000
  stable_until_ratio: 0.8
  micro_batch_size: 1
  grad_accum: 64
  bf16: true
  chunked_ce_size: 128
