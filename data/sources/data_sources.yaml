# LatentLoop-PDS+M real-data pipeline sources.
# All required sources are public Hugging Face datasets intended to be loaded with streaming=True.
# Probe first with: python scripts/data/probe_sources.py --config data/sources/data_sources.yaml
sources:
  fineweb_edu:
    hf_id: HuggingFaceFW/fineweb-edu
    subset: null
    split: train
    text_field: text
    domain: general
    subdomain: edu_web
    license: odc-by
    streaming: true
    default_weight: 0.70
    required: true

  smollm_fineweb_edu_dedup:
    hf_id: HuggingFaceTB/smollm-corpus
    subset: fineweb-edu-dedup
    split: train
    text_field: text
    domain: general
    subdomain: edu_web_dedup
    license: odc-by
    streaming: true
    default_weight: 0.10
    required: true

  cosmopedia_v2:
    hf_id: HuggingFaceTB/smollm-corpus
    subset: cosmopedia-v2
    split: train
    text_field: text
    domain: general
    subdomain: synthetic_edu
    license: odc-by
    streaming: true
    default_weight: 0.05
    required: true

  openmathreasoning:
    hf_id: nvidia/OpenMathReasoning
    subset: null
    split: cot
    formatter: problem_solution
    text_field_priority: [generated_solution, solution, text, problem]
    domain: reasoning
    subdomain: math
    license: cc-by-4.0
    streaming: true
    default_weight: 0.06
    required: true

  codesearchnet_python:
    hf_id: Nan-Do/code-search-net-python
    subset: null
    split: train
    text_field_priority: [whole_func_string, func_code_string, code, docstring, text]
    domain: reasoning
    subdomain: code
    license: apache-2.0
    streaming: true
    default_weight: 0.02
    required: true

planned_fallbacks:
  fineweb_edu:
    - hf_id: allenai/dolma
      subset: v1_6-sample
      split: train
      text_field: text
      domain: general
      license: odc-by
  smollm_fineweb_edu_dedup:
    - hf_id: HuggingFaceFW/fineweb-edu
      subset: null
      split: train
      text_field: text
      domain: general
      license: odc-by
  cosmopedia_v2:
    - hf_id: HuggingFaceTB/smollm-corpus
      subset: cosmopedia-v2
      split: train
      text_field: text
      domain: general
      license: odc-by
  openmathreasoning:
    - synthetic_math_reasoning_seeded
  codesearchnet_python:
    - hf_id: Nan-Do/code-search-net-python
      subset: null
      split: train
      text_field_priority: [whole_func_string, func_code_string, code, docstring, text]
      domain: reasoning
      license: apache-2.0
